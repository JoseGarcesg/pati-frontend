<div class="p-4 bg-white rounded shadow-md max-w-3xl mx-auto">
  <h3 class="text-xl font-bold mb-4">Nuevo Corte</h3>
  <form (ngSubmit)="guardar()" class="space-y-4">

    <!-- Mesa -->
    <div class="flex gap-4 items-center">
      <label class="font-semibold w-24">Mesa:</label>
      <select [(ngModel)]="corteValue.mesa" name="mesa" class="border rounded p-1 flex-1">
        <option *ngFor="let mesa of mesas()" [value]="mesa">{{ mesa }}</option>
      </select>
    </div>

    <!-- Fecha -->
    <div class="flex gap-4 items-center">
      <label class="font-semibold w-24">Fecha:</label>
      <input type="date" [(ngModel)]="corteValue.fechaCorte" name="fechaCorte" class="border rounded p-1 flex-1" />
    </div>

    <!-- Referencia -->
    <div class="flex gap-4 items-center">
      <label class="font-semibold w-24">Referencia:</label>
      <select [(ngModel)]="corteValue.referencia" name="referencia" class="border rounded p-1 flex-1">
        <option *ngFor="let ref of referencias()" [value]="ref">{{ ref }}</option>
      </select>
    </div>

    <!-- Material -->
    <div class="flex gap-4 items-center">
      <label class="font-semibold w-24">Material:</label>
      <select [(ngModel)]="corteValue.material" name="material" class="border rounded p-1 flex-1">
        <option *ngFor="let mat of materiales()" [value]="mat">{{ mat }}</option>
      </select>
    </div>

    <!-- Cantidad programada -->
    <div class="flex gap-4 items-center">
      <label class="font-semibold w-24">Cantidad:</label>
      <input type="number" [(ngModel)]="corteValue.cantidadProgramada" name="cantidadProgramada" class="border rounded p-1 flex-1" />
    </div>

    <hr class="my-4" />

    <!-- Detalles dinámicos -->
    <h4 class="font-bold mb-2">Detalles</h4>
    <div *ngFor="let d of corteValue.detalles; let i = index" class="grid grid-cols-4 gap-2 items-center mb-2">
      
      <select [(ngModel)]="d.talla" name="talla{{i}}" class="border rounded p-1">
        <option *ngFor="let t of tallas()" [value]="t">{{ t }}</option>
      </select>

      <select [(ngModel)]="d.color" name="color{{i}}" class="border rounded p-1">
        <option *ngFor="let c of colores()" [value]="c">{{ c }}</option>
      </select>

      <input type="number" [(ngModel)]="d.cantidad" name="cantidad{{i}}" class="border rounded p-1" placeholder="Cantidad" />

      <button type="button" (click)="eliminarDetalle(i)" class="bg-red-500 text-white rounded px-2 py-1 hover:bg-red-600">
        Eliminar
      </button>
    </div>

    <button type="button" (click)="agregarDetalle()" class="bg-blue-500 text-white rounded px-3 py-1 hover:bg-blue-600">
      Agregar detalle
    </button>

    <div class="mt-4">
      <button type="submit" class="bg-green-500 text-white rounded px-4 py-2 hover:bg-green-600">
        Enviar Corte
      </button>
    </div>

  </form>
</div>
